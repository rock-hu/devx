name: backstage-build
on:
  push:
    branches:
      - "master"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # - run: npm install --force --verbose
      - run: yarn install --immutable
      - run: yarn tsc
      - run: yarn build:backend
