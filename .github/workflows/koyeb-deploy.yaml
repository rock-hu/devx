name: koyeb-deploy
on:
  push:
    branches:
      - "master"
    paths:
      - "package.json"
      - "packages/app/package.json"
      - "packages/backend/package.json"
      - ".github/workflows/backstage-containerization.yaml"
      - ".github/workflows/koyeb-deploy.yaml"
env:
  IMAGE_NAME: backstage
jobs:
  pull:
    name: docker pull ghcr.io
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Pull image from registry
        run: docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
      - name: docker images
        run: docker images
      # - name: docker run
      #   run: docker run -it -p 7007:7007 backstage
      - name: Deploy to Koyeb
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest koyeb/${{ env.IMAGE_NAME }}:latest
          docker push koyeb/${{ env.IMAGE_NAME }}:latest
